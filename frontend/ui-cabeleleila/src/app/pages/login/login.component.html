<form class="example-form" [formGroup]="form" (ngSubmit)="onSubmit()">

  <h2>Login</h2>

  <!-- Email -->
  <mat-form-field class="example-full-width">
    <mat-label>Email</mat-label>
    <input type="email" matInput formControlName="email" placeholder="Ex. usuario@email.com">

    @if (form.get('email')?.hasError('required')) {
      <mat-error>Email é obrigatório</mat-error>
    }
    @if (form.get('email')?.hasError('email')) {
      <mat-error>Email inválido</mat-error>
    }
  </mat-form-field>

  <!-- Senha -->
  <mat-form-field class="example-full-width">
    <mat-label>Senha</mat-label>
    <input matInput [type]="hide() ? 'password' : 'text'" formControlName="senha">

    <button mat-icon-button matSuffix (click)="togglePassword($event)">
      <mat-icon>{{hide() ? 'visibility_off' : 'visibility'}}</mat-icon>
    </button>

    @if (form.get('senha')?.hasError('required')) {
      <mat-error>Senha é obrigatória</mat-error>
    }
  </mat-form-field>

  <!-- Botão -->
  <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
    Entrar
  </button>

  <!-- Link para cadastro -->
  <p class="link-cadastro">
    Não tem conta?
    <a routerLink="/cadastro">Criar conta</a>
  </p>

</form>

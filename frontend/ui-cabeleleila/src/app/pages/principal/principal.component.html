<header>
    <mat-toolbar class="header">

        <!-- Menu -->
        <button mat-icon-button class="menu-btn">
            <mat-icon>menu</mat-icon>
        </button>

        <!-- Logo / Nome -->
        <span class="logo">My App</span>

        <!-- Espaço -->
        <span class="spacer"></span>

        <!-- Ações -->
        <div class="actions">
            <button mat-icon-button>
                <mat-icon>favorite</mat-icon>
            </button>

            <button mat-icon-button>
                <mat-icon>share</mat-icon>
            </button>
        </div>

    </mat-toolbar>
</header>

<main>
    <div class="banner-container">
        <img src="../../../assets/banner/banner-cabeleleila.png" alt="banner">

        <button mat-raised-button color="primary" class="agendamento-btn" mat-raised-button color="primary"
            class="agendamento-btn" (click)="abrirAgendamento()">
            Marcar Agendamento
        </button>
    </div>
</main>
<footer class="footer">

    <div class="footer-content">

        <!-- Logo / Nome -->
        <span class="footer-logo">My App</span>

        <!-- Links -->
        <div class="footer-links">
            <a href="#">Sobre</a>
            <a href="#">Serviços</a>
            <a href="#">Contato</a>
        </div>

        <!-- Direitos -->
        <span class="footer-copy">
            © 2026 My App - Todos os direitos reservados
        </span>

    </div>

</footer>
